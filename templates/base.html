<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Burnham Tracker — Bradshaw Advisory{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a; --panel:#141414; --panel-2:#1c1c1c; --border:#2a2a2a;
      --text:#f4f4f5; --muted:#9a9aa2; --faint:#6b6b73;
      --pink:#ea5278; --pink-soft:#f4849f; --teal:#4ca0a7; --teal-soft:#7fc9cf;
      --head:'Big Shoulders Display','Anton',sans-serif;
      --body:'Source Serif 4',Georgia,serif;
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, .head { font-family: var(--head); text-transform: uppercase; letter-spacing: .02em; font-weight: 700; margin: 0; }

    a { color: var(--teal-soft); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #101010; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    .spinner {
      display:inline-block; width:20px; height:20px;
      border:2px solid #2a2a2a; border-top-color: var(--pink);
      border-radius:50%; animation:spin .75s linear infinite; vertical-align:middle;
    }
    .spinner-lg { width:36px; height:36px; border-width:3px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Buttons */
    .btn-primary {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 18px; background: var(--pink); color:#fff;
      font-family: var(--head); text-transform: uppercase; letter-spacing:.05em;
      font-size:.8125rem; font-weight:700; border:none; cursor:pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background:#d83f67; }
    .btn-primary:disabled { background:#5a3540; color:#c9a9b2; cursor:not-allowed; }

    .btn-secondary {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 18px; background:transparent; color: var(--text);
      font-family: var(--head); text-transform: uppercase; letter-spacing:.05em;
      font-size:.8125rem; font-weight:700; border:1px solid var(--border); cursor:pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--pink); color: var(--pink-soft); }

    /* Form elements */
    .form-input, .form-textarea {
      width:100%; padding:9px 12px; font-size:.9rem; font-family: var(--body);
      border:1px solid var(--border); background:#101010; color: var(--text);
      outline:none; transition:border-color .15s;
    }
    .form-textarea { resize:vertical; line-height:1.6; }
    .form-input:focus, .form-textarea:focus { border-color: var(--pink); }
    ::placeholder { color: var(--faint); }
    input[type="date"].form-input { color: var(--muted); }

    /* Range slider */
    input[type="range"] { -webkit-appearance:none; appearance:none; height:4px; background:#2a2a2a; border-radius:2px; outline:none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:16px; height:16px; border-radius:50%; background: var(--pink); cursor:pointer; }
    input[type="range"]::-moz-range-thumb { width:16px; height:16px; border:none; border-radius:50%; background: var(--pink); cursor:pointer; }

    /* Toast */
    .toast {
      position:fixed; bottom:24px; right:24px; padding:12px 18px;
      font-size:.875rem; font-weight:600; color:#fff; z-index:9999;
      opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { background: var(--teal); }
    .toast.error   { background: var(--pink); }
    .toast.info    { background:#333; }
  </style>
  {% block head %}{% endblock %}
</head>

            <span class="head" style="font-size:1.1rem; color:var(--text);">Burnham Tracker</span>

        </a>
        <div id="header-status" style="font-family:var(--body); font-size:.75rem; color: var(--muted);"></div>
      </div>
    </div>

  <!-- ── Main content ───────────────────────────────────────────────────── -->
  <main style="max-width: 1280px; margin: 0 auto; padding: 24px;">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer style="border-top:1px solid var(--border); margin-top:48px; padding:18px 24px; text-align:center;">
    <span style="font-size:.72rem; color: var(--faint); letter-spacing:.04em;">Bradshaw Advisory &middot; Burnham Tracker</span>
  </footer>

  <div id="toast" class="toast"></div>

  <script>
    window.showToast = function(message, type = 'info', duration = 3500) {
      const t = document.getElementById('toast');
      t.textContent = message;
      t.className = 'toast ' + type;
      void t.offsetWidth;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), duration);
    };
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
